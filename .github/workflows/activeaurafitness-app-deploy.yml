name: Deploy activeaurafitness-app to Server

on:
  push: # Select When Workflow Trigger
    branches:
      - main  # Select Your Branch Here

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '22'  # Use your preferred Node

    - name: Install dependencies
      run: |
        npm install

    - name: Build the project
      run: |
        npm run build  # Assuming you have a build script defined in package.json
      continue-on-error: false  # Fail the workflow if the build step fails

    - name: Deploy to activeaurafitness-app VM
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "./"  # This now correctly points to the current directory
        target: "/var/www/html/Active-Aura-Fitness" # Defile Path Here

    - name: Restart Server Application
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # load nvm
          [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"  # load nvm bash_completion
          cd /var/www/html/Active-Aura-Fitness || exit
          git pull origin main || exit
          git status
          npm install
          # Safe PM2 restart to avoid EADDRINUSE
          cd /var/www/html/Active-Aura-Fitness || exit
          # Safe PM2 restart to avoid EADDRINUSE
          APP_NAME="Active-Aura-Fitness"
          PORT=9000

          # Kill any process using the port (forcefully)
          if sudo lsof -ti:$PORT > /dev/null; then
          echo "Port $PORT is in use. Killing all processes using it..."
          sudo kill -9 $(sudo lsof -t -i:$PORT)
          fi

          # Restart or start PM2
          if pm2 list | grep -q "$APP_NAME"; then
          echo "App already running. Restarting..."
          pm2 restart "$APP_NAME"
           else
          echo "App not running. Starting..."
          pm2 start npm --name "$APP_NAME" -- run start
          fi

          # Save PM2 process list to restart on reboot
          pm2 save
